version: "2"
linters:
  enable:
    - govet
    - errcheck
    - errorlint
    - misspell
    - revive
    - staticcheck
    - whitespace
    - wrapcheck
    - ineffassign
    - unused
    - unconvert
    - bodyclose
    - copyloopvar
    - nilerr
    - nilnil
    - wastedassign
    - maintidx
    - nakedret
    - predeclared
    - gocritic
    - prealloc
    - noctx
    - testifylint
    - unparam
    - nestif
    - gocyclo
    - cyclop
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
    cyclop:
      max-complexity: 70
    gocyclo:
      min-complexity: 70
    nestif:
      min-complexity: 17
    maintidx:
      under: 5
formatters:
  enable:
    - gofumpt
    - goimports
