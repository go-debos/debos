{{ $create := or .create false }}

architecture: amd64

actions:
  # This overlay action is expected to error out because the destination
  # doesn't exist in the filesystem.
  - action: overlay
    description: Overlay file into a missing destination
    source: overlay-missing-destination-file.yaml
    destination: /this/path/does/not/exist/overlay-missing-destination-file.yaml
    create: {{ $create }}

  - action: run
    description: Check out the newly overlayed destination
    chroot: false
    command: ls -ahl ${ROOTDIR}/this/path/does/not/exist
