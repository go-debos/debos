{{ $architecture := or .architecture "amd64" }}
{{ $suite := or .suite "trixie" }}

architecture: {{ $architecture }}

actions:
  - action: mmdebstrap
    description: Bootstrap Debian {{ $suite }}
    suite: {{ $suite }}
    variant: minbase

