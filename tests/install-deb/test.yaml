  # Test installing package from target filesystem
  # TODO: Remove package & clean apt cache after (if running any other tests)
  - action: run
    description: Download Debian packages to target filesystem
    chroot: true
    command: |
      mkdir /pkgs && cd /pkgs
      apt update
      apt download hello

  - action: install-deb
    description: Install Debian packages from target filesystem
    origin: filesystem
    packages:
      - /pkgs/*.deb

  - action: run
    description: Test hello package
    chroot: true
    command: hello

