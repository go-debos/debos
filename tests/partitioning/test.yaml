architecture: amd64

actions:
  - action: image-partition
    description: Partition the image
    imagename: test.img
    imagesize: 8GiB
    partitiontype: gpt
    diskid: 12345678-1234-1234-1234-123456789012
    mountpoints:
      - mountpoint: /
        partition: system
    partitions:
      - name: boot
        fs: ext2
        start: 0%
        end: 256MiB
      - name: system
        fs: ext4
        start: 256MiB
        end: 2GiB
        partuuid: 87654321-1234-5678-9012-345678901234
      - name: data0
        fs: ext4
        start: 2GiB
        end: 3GiB
      - name: data1
        fs: ext4
        start: 3GiB
        end: 4GiB
      - name: data2
        fs: ext4
        start: 4GiB
        end: 5GiB
      - name: data3
        fs: ext4
        start: 5GiB
        end: 6GiB
      - name: data4
        fs: ext4
        start: 6GiB
        end: 7GiB
      - name: data5
        fs: ext4
        start: 7GiB
        end: 8GiB

  - action: run
    chroot: false
    command: >
      cd ${ARTIFACTDIR};
      sfdisk -J test.img | tee ${RECIPEDIR}/actual.json

  - action: run
    description: Compare expected and actual
    chroot: false
    command: bash -c 'diff -u <(jq . ${RECIPEDIR}/expected.json) <(jq . ${RECIPEDIR}/actual.json)'
